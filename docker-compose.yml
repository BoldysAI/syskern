# Local development stack for Syskern Pricing Platform.
# Both local and prod run plain PostgreSQL (no Supabase — see
# docs/agent/decisions.md 2026-06-22); locally a Postgres + Redis pair plus the
# Django dev server.

services:
  postgres:
    image: postgres:16-alpine
    container_name: syskern-postgres
    restart: unless-stopped
    # Log any statement slower than 500 ms (CDC §9.6). In prod the same knob
    # goes in postgresql.conf — see docs/runbooks/monitoring.md.
    command: ["postgres", "-c", "log_min_duration_statement=500"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-syskern}
      POSTGRES_USER: ${POSTGRES_USER:-syskern}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-syskern}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-syskern} -d ${POSTGRES_DB:-syskern}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: syskern-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: syskern-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DATABASE_URL: postgres://${POSTGRES_USER:-syskern}:${POSTGRES_PASSWORD:-syskern}@postgres:5432/${POSTGRES_DB:-syskern}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - exports_data:/tmp/syskern_exports
      # Client Excel sources for the one-shot catalog bootstrap (gitignored files;
      # resolves to /migration/sources = MIGRATION_SOURCES_DIR default).
      - ./migration:/migration
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py bootstrap_catalog &&
             python manage.py runserver 0.0.0.0:8000"

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: syskern-celery-worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DATABASE_URL: postgres://${POSTGRES_USER:-syskern}:${POSTGRES_PASSWORD:-syskern}@postgres:5432/${POSTGRES_DB:-syskern}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - exports_data:/tmp/syskern_exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker --loglevel=info --concurrency=2

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: syskern-celery-beat
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DATABASE_URL: postgres://${POSTGRES_USER:-syskern}:${POSTGRES_PASSWORD:-syskern}@postgres:5432/${POSTGRES_DB:-syskern}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - exports_data:/tmp/syskern_exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: syskern-frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://syskern-backend:8000
      WATCHPACK_POLLING: "true"
      # Base URL de l'instance Odoo pour les liens "Voir dans Odoo" (CDC §4.3).
      # NEXT_PUBLIC_* est inliné au build Next.js → un changement de valeur
      # nécessite un rebuild de l'image frontend (pas seulement un restart).
      NEXT_PUBLIC_ODOO_BASE_URL: ${NEXT_PUBLIC_ODOO_BASE_URL:-}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
    name: syskern_postgres_data
  exports_data:
    name: syskern_exports_data
